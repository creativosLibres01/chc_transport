<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 130">
  <defs>
    <linearGradient id="cg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F5C4D8"/>
      <stop offset="0.5" stop-color="#E8A0BF"/>
      <stop offset="1" stop-color="#D87BA8"/>
    </linearGradient>
  </defs>
  <!-- Left bell -->
  <ellipse cx="30" cy="28" rx="14" ry="10" fill="url(#cg)"/>
  <rect x="18" y="28" width="24" height="32" rx="4" fill="url(#cg)"/>
  <ellipse cx="30" cy="60" rx="12" ry="4" fill="#D87BA8"/>
  <!-- Right bell -->
  <ellipse cx="90" cy="28" rx="14" ry="10" fill="url(#cg)"/>
  <rect x="78" y="28" width="24" height="32" rx="4" fill="url(#cg)"/>
  <ellipse cx="90" cy="60" rx="12" ry="4" fill="#D87BA8"/>
  <!-- Hammer -->
  <rect x="55" y="20" width="10" height="22" rx="3" fill="#B08090"/>
  <!-- Clock face -->
  <circle cx="60" cy="88" r="32" fill="url(#cg)"/>
  <circle cx="60" cy="88" r="25" fill="#FCE8F0"/>
  <circle cx="60" cy="88" r="25" stroke="#D87BA8" stroke-width="2" fill="none"/>
  <line x1="60" y1="88" x2="60" y2="68" stroke="#D87BA8" stroke-width="3" stroke-linecap="round"/>
  <line x1="60" y1="88" x2="76" y2="88" stroke="#D87BA8" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Base -->
  <rect x="42" y="112" width="36" height="10" rx="5" fill="#8B5A6B"/>
</svg>
